<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пример 1 — Combobox</title>
    <script>
        function showDescription(combo) {
            var descField = document.getElementById("description");

            switch (combo.value) {
                case "A":
                    descField.innerHTML = "Мотоциклы";
                    break;
                case "B":
                    descField.innerHTML = "Легковые автомобили";
                    break;
                case "C":
                    descField.innerHTML = "Грузовые автомобили";
                    break;
                case "D":
                    descField.innerHTML = "Автобусы";
                    break;
                case "E":
                    descField.innerHTML = "Автомобили с прицепом";
                    break;
            }
        }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            font-size: 22px;
        }

        select {
            font-size: 22px;
            padding: 5px;
        }

        span {
            font-size: 22px;
        }
    </style>
</head>
<body>
    <select onchange="showDescription(this)">
        <option value="A">Категория A</option>
        <option value="B">Категория B</option>
        <option value="C" selected>Категория C</option>
        <option value="D">Категория D</option>
        <option value="E">Категория E</option>
    </select>

    <span><b>Описание:</b></span>
    <span id="description">Грузовые автомобили</span>
</body>
</html>
